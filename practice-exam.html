<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Claude Certified Architect — Practice Exam</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
:root {
  --bg: #0e0e10;
  --surface: #18181b;
  --card: #ffffff;
  --border: #e4e4e7;
  --text: #18181b;
  --muted: #71717a;
  --d1: #6366f1; --d1-light: #eef2ff;
  --d2: #0891b2; --d2-light: #ecfeff;
  --d3: #059669; --d3-light: #ecfdf5;
  --d4: #d97706; --d4-light: #fffbeb;
  --d5: #dc2626; --d5-light: #fef2f2;
  --correct: #16a34a; --correct-bg: #dcfce7; --correct-border: #86efac;
  --wrong: #dc2626; --wrong-bg: #fee2e2; --wrong-border: #fca5a5;
  --pass: #16a34a;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; color: var(--text); min-height: 100vh; }
#app { min-height: 100vh; display: flex; flex-direction: column; }

/* LAYOUT */
.screen { max-width: 800px; margin: 0 auto; padding: 24px 16px 80px; width: 100%; }
.screen-wide { max-width: 900px; }

/* CARDS */
.card { background: var(--card); border-radius: 12px; padding: 24px; box-shadow: 0 1px 3px rgba(0,0,0,.08); }
.card + .card { margin-top: 16px; }

/* DOMAIN BADGE */
.domain-badge { display: inline-flex; align-items: center; gap: 6px; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .05em; padding: 4px 10px; border-radius: 99px; }

/* PROGRESS */
.progress-bar { height: 4px; border-radius: 2px; background: #27272a; overflow: hidden; }
.progress-fill { height: 100%; border-radius: 2px; transition: width .3s; }
.progress-header { background: var(--surface); padding: 12px 20px; display: flex; align-items: center; gap: 16px; position: sticky; top: 0; z-index: 10; }
.progress-label { font-size: 12px; color: #a1a1aa; white-space: nowrap; min-width: 80px; }

/* BUTTONS */
.btn { display: inline-flex; align-items: center; gap: 8px; padding: 12px 24px; border-radius: 8px; border: none; cursor: pointer; font-size: 15px; font-weight: 600; transition: all .15s; text-decoration: none; }
.btn-primary { background: #6366f1; color: #fff; }
.btn-primary:hover { background: #4f46e5; }
.btn-outline { background: transparent; color: #6366f1; border: 2px solid #6366f1; }
.btn-outline:hover { background: #eef2ff; }
.btn-sm { padding: 8px 16px; font-size: 13px; }
.btn-ghost { background: transparent; color: var(--muted); }
.btn-ghost:hover { color: var(--text); }

/* START SCREEN */
.hero { text-align: center; padding: 48px 0 32px; }
.hero h1 { font-size: 32px; font-weight: 800; color: #fff; letter-spacing: -.02em; }
.hero p { color: #a1a1aa; margin-top: 8px; font-size: 16px; }
.hero .badge { display: inline-flex; align-items: center; gap: 6px; background: #27272a; color: #a1a1aa; font-size: 12px; padding: 4px 12px; border-radius: 99px; margin-bottom: 16px; }
.domain-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; margin: 24px 0; }
.domain-card { padding: 16px 12px; border-radius: 10px; text-align: center; border: 1px solid; cursor: pointer; transition: transform .15s; }
.domain-card:hover { transform: translateY(-2px); }
.domain-card .icon { font-size: 20px; margin-bottom: 8px; }
.domain-card .name { font-size: 11px; font-weight: 600; line-height: 1.3; }
.domain-card .weight { font-size: 20px; font-weight: 800; margin-top: 4px; }
.start-actions { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; margin-top: 24px; }
.info-bar { display: flex; gap: 24px; justify-content: center; margin-top: 24px; flex-wrap: wrap; }
.info-item { display: flex; align-items: center; gap: 6px; color: #a1a1aa; font-size: 13px; }

/* STUDY GUIDE */
.study-header { padding: 24px; border-radius: 12px; color: #fff; margin-bottom: 20px; }
.study-header h2 { font-size: 22px; font-weight: 800; }
.study-header p { opacity: .8; font-size: 14px; margin-top: 4px; }
.tabs { display: flex; gap: 2px; background: #f4f4f5; padding: 4px; border-radius: 8px; margin-bottom: 20px; }
.tab { flex: 1; padding: 8px; border: none; background: transparent; border-radius: 6px; font-size: 13px; font-weight: 600; cursor: pointer; color: var(--muted); transition: all .15s; }
.tab.active { background: #fff; color: var(--text); box-shadow: 0 1px 2px rgba(0,0,0,.08); }
.tab-content { display: none; }
.tab-content.active { display: block; }
.concept-grid { display: grid; gap: 10px; }
.concept-card { padding: 14px 16px; border-left: 3px solid; border-radius: 0 8px 8px 0; background: #f8f8f8; }
.concept-card .term { font-weight: 700; font-size: 14px; margin-bottom: 2px; }
.concept-card .def { font-size: 13px; color: var(--muted); line-height: 1.5; }
.trap-list { list-style: none; display: grid; gap: 8px; }
.trap-list li { display: flex; gap: 10px; align-items: flex-start; font-size: 13px; line-height: 1.5; }
.trap-list li::before { content: "⚠"; flex-shrink: 0; margin-top: 1px; }
.mnemonic-box { background: #1e1b4b; color: #c7d2fe; padding: 20px; border-radius: 10px; font-size: 14px; line-height: 1.7; }
.mnemonic-box strong { color: #a5b4fc; }
.rule-box { background: #fafafa; border: 1px solid var(--border); border-radius: 8px; padding: 14px 16px; font-size: 13px; line-height: 1.6; margin-bottom: 10px; }
.rule-box .rule-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; color: var(--muted); margin-bottom: 4px; }

/* QUIZ */
.question-header { margin-bottom: 20px; }
.scenario-tag { font-size: 11px; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: .04em; margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
.official-tag { background: #fef9c3; color: #854d0e; font-size: 10px; font-weight: 700; padding: 2px 6px; border-radius: 4px; }
.question-text { font-size: 17px; font-weight: 600; line-height: 1.6; color: var(--text); }
.options { display: grid; gap: 10px; margin-top: 20px; }
.option { display: flex; align-items: flex-start; gap: 14px; padding: 14px 16px; border: 2px solid var(--border); border-radius: 10px; cursor: pointer; transition: all .15s; background: #fff; text-align: left; width: 100%; }
.option:hover:not(:disabled) { border-color: #a5b4fc; background: #f5f3ff; }
.option-letter { width: 28px; height: 28px; border-radius: 50%; border: 2px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; flex-shrink: 0; transition: all .15s; margin-top: 1px; }
.option-text { font-size: 14px; line-height: 1.55; color: var(--text); }
.option.correct { border-color: var(--correct-border); background: var(--correct-bg); }
.option.correct .option-letter { background: var(--correct); border-color: var(--correct); color: #fff; }
.option.wrong { border-color: var(--wrong-border); background: var(--wrong-bg); }
.option.wrong .option-letter { background: var(--wrong); border-color: var(--wrong); color: #fff; }
.option.dimmed { opacity: .45; }
.option:disabled { cursor: default; }
.explanation { margin-top: 16px; padding: 16px; border-radius: 8px; font-size: 14px; line-height: 1.6; }
.explanation.correct { background: var(--correct-bg); border-left: 4px solid var(--correct); }
.explanation.wrong { background: var(--wrong-bg); border-left: 4px solid var(--wrong); }
.explanation .expl-label { font-weight: 700; font-size: 12px; text-transform: uppercase; letter-spacing: .04em; margin-bottom: 6px; display: flex; align-items: center; gap: 6px; }
.next-btn-row { margin-top: 20px; display: flex; justify-content: flex-end; }

/* DOMAIN REVIEW */
.score-summary { display: flex; align-items: center; gap: 20px; padding: 24px; border-radius: 12px; margin-bottom: 20px; }
.score-circle { width: 80px; height: 80px; border-radius: 50%; display: flex; flex-direction: column; align-items: center; justify-content: center; flex-shrink: 0; color: #fff; }
.score-circle .sc-pct { font-size: 22px; font-weight: 800; }
.score-circle .sc-label { font-size: 10px; font-weight: 600; opacity: .8; }
.score-circle.pass { background: var(--correct); }
.score-circle.fail { background: var(--wrong); }
.score-circle.ok { background: #d97706; }
.score-info h3 { font-size: 18px; font-weight: 700; }
.score-info p { color: var(--muted); font-size: 14px; margin-top: 4px; }
.missed-list { display: grid; gap: 12px; }
.missed-item { border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
.missed-header { display: flex; align-items: flex-start; gap: 12px; padding: 14px 16px; cursor: pointer; background: #fafafa; }
.missed-header:hover { background: #f4f4f5; }
.missed-q { font-size: 13px; font-weight: 600; line-height: 1.5; flex: 1; }
.missed-icon { color: var(--wrong); flex-shrink: 0; margin-top: 2px; }
.missed-body { padding: 14px 16px; border-top: 1px solid var(--border); display: none; }
.missed-body.open { display: block; }
.missed-correct { font-size: 12px; font-weight: 700; color: var(--correct); margin-bottom: 6px; text-transform: uppercase; letter-spacing: .04em; }
.missed-expl { font-size: 13px; line-height: 1.6; color: var(--muted); }

/* FINAL */
.final-ring-wrap { display: flex; flex-direction: column; align-items: center; padding: 32px 24px; background: var(--surface); border-radius: 16px; margin-bottom: 24px; }
.final-ring-wrap h2 { color: #fff; font-size: 22px; font-weight: 800; margin-top: 16px; }
.final-ring-wrap p { color: #a1a1aa; font-size: 14px; margin-top: 4px; }
.pass-badge { display: inline-flex; align-items: center; gap: 6px; padding: 6px 16px; border-radius: 99px; font-size: 14px; font-weight: 700; margin-top: 12px; }
.pass-badge.pass { background: #dcfce7; color: #16a34a; }
.pass-badge.fail { background: #fee2e2; color: #dc2626; }
.domain-bars { display: grid; gap: 12px; }
.dbar { display: grid; grid-template-columns: 160px 1fr 48px; align-items: center; gap: 12px; }
.dbar-label { font-size: 13px; font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.dbar-track { height: 8px; background: #e4e4e7; border-radius: 4px; overflow: hidden; }
.dbar-fill { height: 100%; border-radius: 4px; transition: width .6s; }
.dbar-pct { font-size: 13px; font-weight: 700; text-align: right; }
.missed-domain-section { margin-top: 8px; }
.missed-domain-section h4 { font-size: 13px; font-weight: 700; margin-bottom: 8px; color: var(--muted); text-transform: uppercase; letter-spacing: .04em; }
.final-actions { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; margin-top: 24px; }

/* RESPONSIVE */
@media (max-width: 600px) {
  .domain-grid { grid-template-columns: repeat(2, 1fr) !important; }
  .dbar { grid-template-columns: 120px 1fr 40px; }
  .score-summary { flex-direction: column; text-align: center; }
  .hero h1 { font-size: 24px; }
}
code { background: #f4f4f5; padding: 1px 5px; border-radius: 4px; font-size: .9em; font-family: 'SF Mono', 'Fira Code', monospace; }
</style>
</head>
<body>
<div id="app"></div>
<script>
// ─── EXAM DATA ───────────────────────────────────────────────────────────────
const PASS_SCALED = 720;
const DOMAINS = [
{
  id:1, name:"Agentic Architecture & Orchestration", weight:27, color:"#6366f1", light:"#eef2ff", icon:"fa-sitemap",
  studyGuide:{
    globalRules:[
      "Deterministic > probabilistic when stakes are real. Financial/security/compliance → hooks or programmatic gates. Style/tone → prompts.",
      "Trace failures to their origin. Scope problems = upstream (decomposition / partitioning / context-passing). Quality problems = subagent prompts.",
      "Proportionate fixes. Single agent beats multi-agent when single suffices. Don't over-engineer."
    ],
    concepts:[
      {term:'stop_reason: "tool_use"', def:'Model wants to call a tool — loop continues: execute tool, append results, call again.'},
      {term:'stop_reason: "end_turn"', def:'Model has finished — present result to user; loop terminates. The ONLY authoritative termination signal.'},
      {term:'Task Tool', def:'SDK mechanism for spawning subagents. allowedTools must include "Task" or the coordinator cannot delegate.'},
      {term:'Subagent Context Isolation', def:'Subagents do NOT inherit coordinator history. Every byte they need must be in their prompt. Nothing carries over.'},
      {term:'Parallel Subagents', def:'Multiple Task tool calls in ONE coordinator response — SDK executes them concurrently. Sequential = separate turns = triple latency.'},
      {term:'Hub-and-Spoke', def:'ALL inter-subagent communication routes through coordinator. Subagents never talk directly to each other.'},
      {term:'Programmatic Enforcement', def:'Code-level prerequisites block downstream calls — 100% deterministic. Cannot be achieved with prompts alone.'},
      {term:'PreToolUse Hook', def:'Fires BEFORE tool executes. Use for: gates, authorization, prerequisites, financial limits, capturing prior state hash for audit.'},
      {term:'PostToolUse Hook', def:'Fires AFTER tool, before model sees result. Use for: normalizing formats, redacting PII, truncating verbose outputs.'},
      {term:'Idempotency Key', def:'UUID generated on FIRST attempt, passed on every retry. Server-side dedup prevents double-charging. Required for financial retries.'},
      {term:'fork_session', def:'Creates independent branches from a shared expensive baseline. Use for exploring N alternatives from the same analysis.'},
      {term:'Evaluator–Optimiser', def:'Pattern for iterative refinement with checkable quality criteria. Fails when criteria are subjective — loop spins indefinitely.'}
    ],
    traps:[
      "Parsing natural language for 'I'm done' to determine loop termination — only stop_reason is authoritative",
      "Using iteration caps as the PRIMARY stopping mechanism (caps are safety backstops, not the loop signal)",
      "Assuming subagents inherit coordinator context automatically — they don't. Every byte must be explicit",
      "Using prompt instructions for financial/security enforcement — non-zero failure rate, use hooks instead",
      "Emitting multiple Task calls across separate turns for 'parallel' — only single-response emission is truly parallel",
      "Blaming downstream subagents when topics are missing — trace it to the coordinator's decomposition",
      "Overlooking that allowedTools must include 'Task' for coordinator to delegate"
    ],
    mnemonic:`<strong>STOP</strong> — Agentic loop:
• <strong>S</strong>top on end_turn only (stop_reason is the signal)
• <strong>T</strong>ask tool to spawn (allowedTools must include it)
• <strong>O</strong>nce per response for parallel (multiple Task calls, single response)
• <strong>P</strong>rogrammatic for stakes (hooks when failure = financial harm)

<strong>"Nothing carries over to subagents. The prompt is their universe."</strong>`
  },
  questions:[
    {
      scenario:"Customer Support Agent",
      official:true,
      text:"Production data shows that in 12% of cases, your customer support agent skips <code>get_customer</code> entirely and calls <code>lookup_order</code> using only the customer's stated name, occasionally leading to misidentified accounts and incorrect refunds. What change would most effectively address this reliability issue?",
      options:["Add a programmatic prerequisite that blocks <code>lookup_order</code> and <code>process_refund</code> calls until <code>get_customer</code> has returned a verified customer ID","Enhance the system prompt to state that customer verification via <code>get_customer</code> is mandatory before any order operations","Add few-shot examples showing the agent always calling <code>get_customer</code> first, even when customers volunteer order details","Implement a routing classifier that analyzes each request and enables only the subset of tools appropriate for that request type"],
      correct:0,
      explanation:"When a specific tool sequence is required for critical business logic, programmatic enforcement provides deterministic guarantees that prompt-based approaches cannot. Options B and C rely on probabilistic LLM compliance (~95-99%), which is insufficient when errors have financial consequences. Option D addresses tool availability rather than tool ordering, which is not the actual problem. Only hooks give you 100%."
    },
    {
      scenario:"Agentic Loop Design",
      text:"In the Claude Agent SDK, your loop receives a response where <code>stop_reason</code> is <code>'tool_use'</code>. What should your code do?",
      options:["Execute the requested tool(s), append both the assistant response and tool results to messages, then call Claude again","Present the response text to the user — stop_reason tool_use means the model wants to describe the tool but not call it","Terminate the loop and extract the final answer from the tool call parameters","Wait for user confirmation before executing any tool, regardless of the tool type"],
      correct:0,
      explanation:"stop_reason: 'tool_use' means Claude wants to call a tool and is waiting for results. The loop must: (1) execute the tool, (2) append the assistant response AND tool results to the message history, (3) call Claude again. Only stop_reason: 'end_turn' signals completion. The common trap is checking for text content to determine completion — tool_use responses can begin with a text block."
    },
    {
      scenario:"Multi-Agent Architecture",
      text:"A coordinator agent passes its task assignment to a subagent. What context does the subagent automatically receive from the coordinator?",
      options:["Only what is explicitly included in the subagent's prompt — subagents do not inherit coordinator history or share memory between invocations","The coordinator's full conversation history and all prior tool results","The coordinator's system prompt and the most recent 10 turns of conversation","All tool results from the coordinator's current session"],
      correct:0,
      explanation:"Subagents operate with isolated context — they do NOT inherit the coordinator's conversation history automatically. Every byte of context they need must be explicitly included in their prompt. This is the most common misconception about multi-agent systems. If the synthesis agent needs web search results, those results must appear verbatim in its prompt."
    },
    {
      scenario:"Parallel Execution",
      text:"How do you spawn multiple subagents to run in parallel within a single coordinator turn in the Claude Agent SDK?",
      options:["Emit multiple Task tool calls in a single coordinator response — the SDK executes them concurrently","Make multiple sequential API calls to subagents with parallel=True in the AgentDefinition","Set parallel_execution: true in the coordinator's system prompt configuration","Use Python threading in your orchestration code to call each subagent's API endpoint concurrently"],
      correct:0,
      explanation:"Parallel subagent execution is achieved by emitting multiple Task tool calls in a SINGLE coordinator response, not across separate turns. Sequential turns = sequential execution. The SDK detects multiple Task tool calls in one response and executes them concurrently. Option B and D bypass the Agent SDK's coordination mechanism and lose observability."
    },
    {
      scenario:"Multi-Agent Research System",
      official:true,
      text:"After running your multi-agent research system on 'impact of AI on creative industries,' each subagent completes successfully. However, final reports cover only visual arts, missing music, writing, and film production. The coordinator's logs show it decomposed the topic into: 'AI in digital art creation,' 'AI in graphic design,' and 'AI in photography.' What is the most likely root cause?",
      options:["The synthesis agent lacks instructions for identifying coverage gaps in findings it receives","The coordinator agent's task decomposition is too narrow — subagent assignments don't cover all relevant domains","The web search agent's queries are not comprehensive enough and need expansion","The document analysis agent filters out non-visual creative industry sources due to overly restrictive relevance criteria"],
      correct:1,
      explanation:"The coordinator's logs reveal the root cause directly: it decomposed 'creative industries' into only visual arts subtasks, completely omitting music, writing, and film. The subagents executed their assigned tasks correctly — the problem is what they were assigned. Options A, C, and D incorrectly blame downstream agents working correctly within their assigned (but too-narrow) scope. Trace failures upstream."
    },
    {
      scenario:"Hook Design",
      text:"You need to ensure that specific fields returned by a customer lookup tool are always in ISO 8601 date format before the model processes them — the tool returns inconsistent date formats across different customers. Which hook type and timing is correct?",
      options:["PostToolUse hook — fires after tool execution, before model sees result; transforms the raw output to normalized ISO 8601 format","PreToolUse hook — fires before tool execution; modifies the date format parameters before the call is made","A separate normalisation subagent that runs after each tool call and before the coordinator receives results","System prompt instruction: 'Always expect dates in ISO 8601 format from lookup tools'"],
      correct:0,
      explanation:"PostToolUse fires AFTER the tool executes but BEFORE the model sees the result — exactly the right moment for normalisation. The raw tool output with inconsistent formats goes in; normalised ISO 8601 comes out. PreToolUse fires before execution, so it can't transform output. A separate normalisation subagent adds unnecessary orchestration overhead. Prompt instructions cannot change what the tool actually returns."
    },
    {
      scenario:"Workflow Enforcement",
      text:"A financial trading agent must verify user authorisation before executing any trade above $10,000. The requirement is that this rule must NEVER be violated. Which implementation is correct?",
      options:["A PreToolUse hook that intercepts trade execution calls and blocks them if the authorisation prerequisite hasn't been satisfied","A system prompt instruction: 'Always verify authorisation before executing trades above $10,000'","Few-shot examples in the prompt demonstrating the correct authorisation-first workflow","A routing subagent whose prompt emphasises the authorisation requirement before delegating to the trading agent"],
      correct:0,
      explanation:"'Must NEVER be violated' = deterministic enforcement = hooks. The PreToolUse hook intercepts the trade execution call before it runs and enforces the authorisation check programmatically — 100% compliance. Options B, C, and D all rely on LLM compliance, which has a non-zero failure rate (~1-5%). When a single failure causes financial or security harm, only programmatic enforcement is acceptable."
    },
    {
      scenario:"Error Handling",
      text:"Your multi-agent pipeline's document analysis subagent encounters a 429 rate limit error. Your refund processing subagent encounters a 400 bad request error. What is the correct handling for each?",
      options:["429: retry with exponential backoff and jitter; 400: classify as permanent, feed error context back to model or escalate — do not retry","429: terminate the pipeline and report failure; 400: retry immediately with the same request","Both: retry with exponential backoff until success","Both: catch the error, return empty string to prevent the coordinator from seeing the failure"],
      correct:0,
      explanation:"Error types require different handling. 429 (rate limit) is TRANSIENT — retry with exponential backoff + jitter, capped retries. 400 (bad request) is PERMANENT — the same request will fail again; don't retry, feed the error back to the model or escalate. Blanket retry on all errors leads to wasted calls and duplicate actions. Silently returning empty string (Option D) is a dangerous anti-pattern — the model produces confident wrong answers without knowing the tool failed."
    },
    {
      scenario:"Session Management",
      text:"Your team has completed a large codebase analysis session. Now you want to explore two different refactoring approaches (dependency injection vs. service locator pattern) from that same analysis, comparing them independently without mixing their conclusions. What is the correct mechanism?",
      options:["Use fork_session to create independent branches from the shared codebase analysis baseline, exploring each approach separately","Use --resume <session-name> twice in separate terminal windows to run both explorations simultaneously","Start two fresh sessions and re-run the full codebase analysis for each approach","Create two subagents in the same coordinator session, one for each approach, sharing the analysis context"],
      correct:0,
      explanation:"fork_session creates independent branches from a shared expensive baseline — exactly for 'explore N alternatives from the same analysis.' Both branches start with the same codebase findings but diverge independently, so conclusions don't contaminate each other. --resume continues the same session (not branching). Starting fresh sessions wastes the expensive analysis. Subagents within one session would share context and potentially contaminate each other's conclusions."
    },
    {
      scenario:"Task Decomposition",
      text:"You're building a content generation pipeline: analyze brief → research topic → write draft → review draft → final edit. Each step requires the prior step's output. A user can request anything from a 500-word blog post to a 10,000-word report. Which task decomposition pattern is most appropriate?",
      options:["Fixed sequential pipeline with typed subagents for each role (analyzer, researcher, writer, reviewer, editor)","Dynamic decomposition that generates subtasks based on what is discovered at each step","Orchestrator–worker with uniform worker agents differentiated only by prompt-supplied scope","Evaluator–optimiser that iterates until quality criteria are met"],
      correct:0,
      explanation:"The task has a stable, predictable structure (always these 5 steps, always this order, always each step consumes prior output) — classic fixed sequential pipeline. Each step is a distinct role with different tools and reasoning, so typed subagents (not uniform workers) are appropriate. Dynamic decomposition applies when structure isn't known upfront. Evaluator-optimiser applies when first-pass output is often insufficient and quality is objectively checkable."
    },
    {
      scenario:"Multi-Concern Requests",
      text:"A customer support message says: 'I was charged twice for my order last week AND the replacement item I received is damaged.' Both issues need investigation and resolution. What is the optimal orchestration approach?",
      options:["Decompose into two distinct items (billing dispute, damaged item), investigate each in parallel using shared customer context, then synthesize a unified resolution","Handle issues sequentially — resolve billing dispute first, then investigate damage — to avoid context confusion between issues","Escalate immediately because multi-issue requests exceed single-agent scope","Ask the customer to submit separate tickets for each issue to ensure each receives proper attention"],
      correct:0,
      explanation:"Multi-concern requests should be decomposed into distinct items, investigated in parallel (the issues are independent), using shared context from the initial conversation (customer ID, order details), then synthesized into a unified resolution. Sequential handling adds unnecessary latency. Escalation is wrong for manageable multi-issue cases. Separate tickets create poor customer experience and may violate the 80%+ first-contact resolution target."
    },
    {
      scenario:"Observability Design",
      text:"Your multi-agent research pipeline sometimes produces reports missing source attribution — claims appear without citation. Logs show individual subagents complete successfully and return results. Where is the most likely failure point?",

      options:["Structured state manifests — each completed subagent exports its findings and state to a known file location; the coordinator loads this manifest on restart and injects completed findings directly into the remaining agents' prompts","Use --resume with the session name to continue exactly where processing stopped","Restart the entire pipeline — completed work may have been affected by the crash and should be re-validated","Store the conversation history in a database for automatic restoration on restart"],
      correct:0,
      explanation:"Structured state manifests allow crash recovery without re-running expensive completed work. Each subagent exports its state (completed findings, confidence scores, what was attempted) to a known file location. On resume, the coordinator loads the manifest and injects the already-completed findings directly into the remaining agents' prompts as initial context. --resume (B) works for conversational context but may have stale tool results. Full restart (C) wastes the completed analysis. DB conversation history (D) doesn't capture structured agent state."
    }
  ]
}
];

// ─── STATE ───────────────────────────────────────────────────────────────────
const state = {
  mode: 'start',           // start | study | quiz | review | final
  dIdx: 0,                 // current domain index
  qIdx: 0,                 // current question index within domain
  selected: null,          // selected option index
  showExpl: false,
  answers: DOMAINS.map(d => Array(d.questions.length).fill(null)),
  studyTab: 0,
  expandedMissed: new Set(),
};

// ─── HELPERS ─────────────────────────────────────────────────────────────────
const $ = (sel) => document.querySelector(sel);
function domainColor(i) { return DOMAINS[i].color; }
function pct(correct, total) { return total ? Math.round(correct/total*100) : 0; }
function scaledScore(raw_pct) { return Math.round(100 + (raw_pct/100)*900); }

function totalStats() {
  let correct = 0, total = 0;
  DOMAINS.forEach((d,di) => {
    d.questions.forEach((q,qi) => {
      total++;
      if (state.answers[di][qi] === q.correct) correct++;
    });
  });
  return { correct, total, pct: pct(correct,total) };
}

function domainStats(di) {
  const d = DOMAINS[di];
  let correct = 0;
  d.questions.forEach((q,qi) => {
    if (state.answers[di][qi] === q.correct) correct++;
  });
  return { correct, total: d.questions.length, pct: pct(correct, d.questions.length) };
}

// ─── RENDER ──────────────────────────────────────────────────────────────────
function render() {
  const app = document.getElementById('app');
  if (state.mode === 'start') app.innerHTML = renderStart();
  else if (state.mode === 'study') app.innerHTML = renderStudy();
  else if (state.mode === 'quiz') app.innerHTML = renderQuiz();
  else if (state.mode === 'review') app.innerHTML = renderReview();
  else if (state.mode === 'final') app.innerHTML = renderFinal();
  attachHandlers();
}

// ── START ────────────────────────────────────────────────────────────────────
function renderStart() {
  const dCards = DOMAINS.map((d,i) => `
    <div class="domain-card" style="background:${d.light};border-color:${d.color}22;color:${d.color}" onclick="jumpToStudy(${i})">
      <div class="icon"><i class="fas ${d.icon}"></i></div>
      <div class="name">${d.name}</div>
      <div class="weight" style="color:${d.color}">${d.weight}%</div>
    </div>`).join('');
  return `
    <div class="screen">
      <div class="hero">
        <div class="badge"><i class="fas fa-certificate"></i> Claude Certified Architect — Foundations</div>
        <h1>Practice Exam</h1>
        <p>Scenario-based questions · 5 domains · Passing score 720/1000</p>
      </div>
      <div class="card">
        <div class="domain-grid">${dCards}</div>
        <div class="start-actions">
          <button class="btn btn-primary" onclick="startExam()"><i class="fas fa-play"></i> Start Full Exam</button>
          <button class="btn btn-outline" onclick="jumpToStudy(0)"><i class="fas fa-book-open"></i> Study Domains First</button>
        </div>
      </div>
      <div class="info-bar">
        <span class="info-item"><i class="fas fa-layer-group"></i> 5 domains</span>
        <span class="info-item"><i class="fas fa-star"></i> 12 official sample Qs</span>
        <span class="info-item"><i class="fas fa-trophy"></i> Pass: 720/1000</span>
      </div>
    </div>`;
}

function jumpToStudy(i) { state.dIdx = i; state.mode = 'study'; state.studyTab = 0; render(); }
function startExam() { state.dIdx = 0; state.mode = 'study'; state.studyTab = 0; render(); }

// ── STUDY GUIDE ──────────────────────────────────────────────────────────────
function renderStudy() {
  const d = DOMAINS[state.dIdx];
  const sg = d.studyGuide;
  const tabs = ['Key Concepts','Exam Traps','Framework'];

  const conceptCards = sg.concepts.map(c => `
    <div class="concept-card" style="border-left-color:${d.color}">
      <div class="term" style="color:${d.color}">${c.term}</div>
      <div class="def">${c.def}</div>
    </div>`).join('');

  const trapItems = sg.traps.map(t => `<li>${t}</li>`).join('');

  const rulesHtml = (sg.globalRules||[]).map((r,i) => `
    <div class="rule-box">
      <div class="rule-label" style="color:${d.color}">Rule ${i+1}</div>
      ${r}
    </div>`).join('');

  const tabContents = [
    `<div class="concept-grid">${conceptCards}</div>`,
    `<ul class="trap-list">${trapItems}</ul>`,
    `${rulesHtml}<div class="mnemonic-box">${sg.mnemonic}</div>`
  ];

  const tabHtml = tabs.map((t,i) => `<button class="tab${state.studyTab===i?' active':''}" onclick="setStudyTab(${i})">${t}</button>`).join('');
  const contentHtml = tabContents.map((c,i) => `<div class="tab-content${state.studyTab===i?' active':''}">${c}</div>`).join('');

  const domNav = DOMAINS.map((dd,i) => `<button class="btn btn-sm${i===state.dIdx?' btn-primary':' btn-ghost'}" style="${i===state.dIdx?`background:${d.color};`:''}" onclick="jumpToStudy(${i})">${i+1}</button>`).join('');

  return `
    <div class="progress-header">
      <div class="progress-label">Domain ${state.dIdx+1}/5</div>
      <div class="progress-bar" style="flex:1"><div class="progress-fill" style="width:${(state.dIdx/5)*100}%;background:${d.color}"></div></div>
      <div style="display:flex;gap:4px">${domNav}</div>
    </div>
    <div class="screen">
      <div class="study-header" style="background:linear-gradient(135deg,${d.color},${d.color}cc)">
        <div style="display:flex;align-items:center;gap:12px">
          <i class="fas ${d.icon}" style="font-size:24px;opacity:.9"></i>
          <div>
            <h2>${d.name}</h2>
            <p>${d.weight}% of exam · ${d.questions.length} practice questions</p>
          </div>
        </div>
      </div>
      <div class="card">
        <div class="tabs">${tabHtml}</div>
        ${contentHtml}
      </div>
      <div style="margin-top:20px;display:flex;justify-content:space-between;align-items:center">
        ${state.dIdx > 0 ? `<button class="btn btn-outline btn-sm" onclick="jumpToStudy(${state.dIdx-1})"><i class="fas fa-arrow-left"></i> Previous Domain</button>` : '<span></span>'}
        <button class="btn btn-primary" onclick="startDomainQuiz()">
          Start ${d.name.split(' ')[0]} Quiz <i class="fas fa-arrow-right"></i>
        </button>
      </div>
    </div>`;
}

function setStudyTab(i) { state.studyTab = i; render(); }
function startDomainQuiz() { state.qIdx = 0; state.selected = null; state.showExpl = false; state.mode = 'quiz'; render(); }

// ── QUIZ ─────────────────────────────────────────────────────────────────────
function renderQuiz() {
  const d = DOMAINS[state.dIdx];
  const q = d.questions[state.qIdx];
  const totalQ = d.questions.length;
  const progPct = ((state.qIdx) / totalQ) * 100;

  const optionsHtml = q.options.map((opt,i) => {
    let cls = 'option';
    if (state.showExpl) {
      if (i === q.correct) cls += ' correct';
      else if (i === state.selected) cls += ' wrong';
      else cls += ' dimmed';
    }
    return `<button class="option ${cls}" onclick="selectOption(${i})" ${state.showExpl?'disabled':''}>
      <span class="option-letter">${String.fromCharCode(65+i)}</span>
      <span class="option-text">${opt}</span>
    </button>`;
  }).join('');

  const explHtml = state.showExpl ? `
    <div class="explanation ${state.selected===q.correct?'correct':'wrong'}">
      <div class="expl-label">
        <i class="fas ${state.selected===q.correct?'fa-circle-check':'fa-circle-xmark'}"></i>
        ${state.selected===q.correct?'Correct!':'Incorrect — Correct answer: '+String.fromCharCode(65+q.correct)}
      </div>
      ${q.explanation}
    </div>
    <div class="next-btn-row">
      <button class="btn btn-primary" onclick="nextQuestion()">
        ${state.qIdx+1 < totalQ ? 'Next Question <i class="fas fa-arrow-right"></i>' : 'See Domain Results <i class="fas fa-chart-bar"></i>'}
      </button>
    </div>` : '';

  return `
    <div class="progress-header">
      <div class="progress-label" style="color:${d.color}">Domain ${state.dIdx+1}</div>
      <div class="progress-bar" style="flex:1"><div class="progress-fill" style="width:${progPct}%;background:${d.color}"></div></div>
      <div class="progress-label" style="text-align:right">Q${state.qIdx+1}/${totalQ}</div>
    </div>
    <div class="screen">
      <div class="card">
        <div class="question-header">
          <div class="scenario-tag">
            <span style="background:${d.light};color:${d.color};padding:3px 8px;border-radius:4px;font-size:11px;font-weight:700">${d.name}</span>
            <span style="color:#a1a1aa">·</span>
            <span>${q.scenario}</span>
            ${q.official?'<span class="official-tag">★ Official Sample Q</span>':''}
          </div>
          <div class="question-text">${q.text}</div>
        </div>
        <div class="options">${optionsHtml}</div>
        ${explHtml}
      </div>
      <div style="margin-top:12px;display:flex;justify-content:center">
        <button class="btn btn-ghost btn-sm" onclick="exitToStudy()"><i class="fas fa-book"></i> Back to Study Guide</button>
      </div>
    </div>`;
}

function selectOption(i) {
  if (state.showExpl) return;
  state.selected = i;
  state.answers[state.dIdx][state.qIdx] = i;
  state.showExpl = true;
  render();
  document.querySelector('.explanation')?.scrollIntoView({behavior:'smooth',block:'nearest'});
}

function nextQuestion() {
  const d = DOMAINS[state.dIdx];
  if (state.qIdx + 1 < d.questions.length) {
    state.qIdx++;
    state.selected = null;
    state.showExpl = false;
    render();
    window.scrollTo({top:0,behavior:'smooth'});
  } else {
    state.mode = 'review';
    render();
    window.scrollTo({top:0,behavior:'smooth'});
  }
}

function exitToStudy() { state.mode = 'study'; state.studyTab = 0; render(); }

// ── DOMAIN REVIEW ────────────────────────────────────────────────────────────
function renderReview() {
  const d = DOMAINS[state.dIdx];
  const stats = domainStats(state.dIdx);
  const p = stats.pct;
  const circleClass = p >= 80 ? 'pass' : p >= 60 ? 'ok' : 'fail';

  const missedHtml = d.questions.map((q,qi) => {
    const ans = state.answers[state.dIdx][qi];
    if (ans === q.correct) return '';
    const expanded = state.expandedMissed.has(`${state.dIdx}-${qi}`);
    return `
      <div class="missed-item">
        <div class="missed-header" onclick="toggleMissed('${state.dIdx}-${qi}')">
          <span class="missed-icon"><i class="fas fa-circle-xmark"></i></span>
          <span class="missed-q">Q${qi+1}: ${q.text.replace(/<[^>]+>/g,'').substring(0,90)}…</span>
          <i class="fas fa-chevron-${expanded?'up':'down'}" style="color:#a1a1aa;flex-shrink:0"></i>
        </div>
        <div class="missed-body${expanded?' open':''}">
          <div class="missed-correct">Correct: ${String.fromCharCode(65+q.correct)} — ${q.options[q.correct].replace(/<[^>]+>/g,'')}</div>
          ${ans !== null ? `<div style="margin-bottom:8px;font-size:12px;color:#dc2626">Your answer: ${String.fromCharCode(65+ans)} — ${q.options[ans].replace(/<[^>]+>/g,'')}</div>` : ''}
          <div class="missed-expl">${q.explanation}</div>
        </div>
      </div>`;
  }).join('');

  const allCorrect = d.questions.map((q,qi) => state.answers[state.dIdx][qi] === q.correct);
  const scoreRow = d.questions.map((q,qi) => {
    const ok = state.answers[state.dIdx][qi] === q.correct;
    return `<span style="display:inline-flex;align-items:center;justify-content:center;width:28px;height:28px;border-radius:50%;background:${ok?'#dcfce7':'#fee2e2'};color:${ok?'#16a34a':'#dc2626'};font-size:11px;font-weight:700;margin:2px">${qi+1}</span>`;
  }).join('');

  const isLast = state.dIdx === DOMAINS.length - 1;

  return `
    <div class="screen">
      <div class="score-summary" style="background:linear-gradient(135deg,${DOMAINS[state.dIdx].color}15,${DOMAINS[state.dIdx].color}08);border:1px solid ${DOMAINS[state.dIdx].color}22">
        <div class="score-circle ${circleClass}">
          <span class="sc-pct">${p}%</span>
          <span class="sc-label">${stats.correct}/${stats.total}</span>
        </div>
        <div class="score-info">
          <h3>${d.name}</h3>
          <p>${p>=80?'Strong performance!':p>=60?'Passing range — review missed questions':'Below target — revisit the study guide'}</p>
        </div>
      </div>
      <div class="card" style="margin-bottom:16px">
        <div style="font-size:12px;font-weight:600;color:#71717a;margin-bottom:10px;text-transform:uppercase;letter-spacing:.04em">Question Results</div>
        <div style="display:flex;flex-wrap:wrap;gap:4px">${scoreRow}</div>
      </div>
      ${missedHtml ? `<div class="card"><div style="font-size:13px;font-weight:700;margin-bottom:12px;color:#dc2626"><i class="fas fa-circle-xmark"></i> Missed Questions (${d.questions.length - stats.correct})</div><div class="missed-list">${missedHtml}</div></div>` : `<div class="card" style="text-align:center;color:#16a34a;font-weight:700;padding:32px"><i class="fas fa-trophy" style="font-size:32px;display:block;margin-bottom:8px"></i>Perfect score on this domain!</div>`}
      <div style="margin-top:20px;display:flex;gap:12px;justify-content:space-between;flex-wrap:wrap">
        <button class="btn btn-outline btn-sm" onclick="retakeDomain()"><i class="fas fa-rotate-left"></i> Retake Domain</button>
        <button class="btn btn-primary" onclick="nextDomain()">
          ${isLast ? '<i class="fas fa-flag-checkered"></i> Final Results' : 'Next Domain <i class="fas fa-arrow-right"></i>'}
        </button>
      </div>
    </div>`;
}

function toggleMissed(key) {
  if (state.expandedMissed.has(key)) state.expandedMissed.delete(key);
  else state.expandedMissed.add(key);
  render();
}

function retakeDomain() {
  state.answers[state.dIdx] = Array(DOMAINS[state.dIdx].questions.length).fill(null);
  state.qIdx = 0; state.selected = null; state.showExpl = false;
  state.mode = 'study'; state.studyTab = 0; render();
}

function nextDomain() {
  if (state.dIdx < DOMAINS.length - 1) {
    state.dIdx++;
    state.qIdx = 0; state.selected = null; state.showExpl = false;
    state.mode = 'study'; state.studyTab = 0;
  } else {
    state.mode = 'final';
  }
  render(); window.scrollTo({top:0,behavior:'smooth'});
}

// ── FINAL RESULTS ────────────────────────────────────────────────────────────
function renderFinal() {
  const total = totalStats();
  const scaled = scaledScore(total.pct);
  const passed = scaled >= PASS_SCALED;

  // SVG ring
  const r = 80, cx = 100, cy = 100, circ = 2*Math.PI*r;
  const offset = circ * (1 - total.pct/100);
  const ringColor = passed ? '#16a34a' : total.pct >= 60 ? '#d97706' : '#dc2626';
  const ring = `<svg width="200" height="200" viewBox="0 0 200 200">
    <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="#27272a" stroke-width="14"/>
    <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${ringColor}" stroke-width="14"
      stroke-dasharray="${circ}" stroke-dashoffset="${offset}" stroke-linecap="round"
      transform="rotate(-90 ${cx} ${cy})" style="transition:stroke-dashoffset 1s"/>
    <text x="${cx}" y="${cy-10}" text-anchor="middle" font-size="32" font-weight="800" fill="#fff">${total.pct}%</text>
    <text x="${cx}" y="${cy+16}" text-anchor="middle" font-size="14" fill="#a1a1aa">${total.correct}/${total.total} correct</text>
    <text x="${cx}" y="${cy+36}" text-anchor="middle" font-size="13" font-weight="700" fill="${ringColor}">${scaled}/1000</text>
  </svg>`;

  const domBars = DOMAINS.map((d,i) => {
    const s = domainStats(i);
    const barColor = s.pct>=80?'#16a34a':s.pct>=60?'#d97706':'#dc2626';
    return `<div class="dbar">
      <div class="dbar-label" title="${d.name}">${d.name.split(' ').slice(0,2).join(' ')}</div>
      <div class="dbar-track"><div class="dbar-fill" style="width:${s.pct}%;background:${barColor}"></div></div>
      <div class="dbar-pct" style="color:${barColor}">${s.pct}%</div>
    </div>`;
  }).join('');

  // All missed across all domains
  let allMissed = '';
  DOMAINS.forEach((d,di) => {
    const domMissed = d.questions.map((q,qi) => {
      if (state.answers[di][qi] === q.correct) return '';
      const expanded = state.expandedMissed.has(`${di}-${qi}`);
      return `<div class="missed-item">
        <div class="missed-header" onclick="toggleMissed('${di}-${qi}')">
          <span class="missed-icon"><i class="fas fa-circle-xmark"></i></span>
          <span class="missed-q">Q${qi+1}: ${q.text.replace(/<[^>]+>/g,'').substring(0,85)}…</span>
          <i class="fas fa-chevron-${expanded?'up':'down'}" style="color:#a1a1aa;flex-shrink:0"></i>
        </div>
        <div class="missed-body${expanded?' open':''}">
          <div class="missed-correct">Correct: ${String.fromCharCode(65+q.correct)} — ${q.options[q.correct].replace(/<[^>]+>/g,'')}</div>
          <div class="missed-expl">${q.explanation}</div>
        </div>
      </div>`;
    }).join('');
    if (domMissed.trim()) {
      allMissed += `<div class="missed-domain-section"><h4 style="color:${d.color}"><i class="fas ${d.icon}"></i> ${d.name}</h4><div class="missed-list">${domMissed}</div></div>`;
    }
  });

  return `
    <div class="screen screen-wide">
      <div class="final-ring-wrap">
        ${ring}
        <h2>${passed?'Exam Passed!':'Not Quite There Yet'}</h2>
        <p>${passed?'You met the 720/1000 passing threshold.':'The passing score is 720/1000. Keep studying!'}</p>
        <span class="pass-badge ${passed?'pass':'fail'}">
          <i class="fas ${passed?'fa-circle-check':'fa-circle-xmark'}"></i>
          ${scaled}/1000 scaled score — ${passed?'PASS':'FAIL'}
        </span>
      </div>
      <div class="card" style="margin-bottom:16px">
        <div style="font-size:12px;font-weight:600;color:#71717a;margin-bottom:14px;text-transform:uppercase;letter-spacing:.04em">Domain Breakdown</div>
        <div class="domain-bars">${domBars}</div>
      </div>
      ${allMissed ? `<div class="card"><div style="font-size:13px;font-weight:700;margin-bottom:16px;color:#dc2626"><i class="fas fa-book-open"></i> Review Missed Questions</div>${allMissed}</div>` : '<div class="card" style="text-align:center;padding:32px;color:#16a34a;font-weight:700"><i class="fas fa-trophy" style="font-size:40px;display:block;margin-bottom:8px"></i>Perfect score — all questions correct!</div>'}
      <div class="final-actions">
        <button class="btn btn-primary" onclick="restartExam()"><i class="fas fa-rotate-left"></i> Restart Exam</button>
        <button class="btn btn-outline" onclick="jumpToStudy(0)"><i class="fas fa-book-open"></i> Review Study Guides</button>
      </div>
    </div>`;
}

function restartExam() {
  state.mode = 'start';
  state.dIdx = 0; state.qIdx = 0;
  state.selected = null; state.showExpl = false;
  state.answers = DOMAINS.map(d => Array(d.questions.length).fill(null));
  state.expandedMissed = new Set();
  render(); window.scrollTo({top:0,behavior:'smooth'});
}

// ─── EVENT DELEGATION ────────────────────────────────────────────────────────
function attachHandlers() { /* inline onclick handles everything */ }

// ─── BOOT ────────────────────────────────────────────────────────────────────
render();
</script>
</body>
</html>
